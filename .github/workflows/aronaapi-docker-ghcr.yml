name: Build AronaApi Docker image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.trellis/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional image tag, for example 2026-07-05 or prod-20260705'
        required: false
        type: string
      push_latest:
        description: 'Also update ghcr.io/<owner>/<repo>:latest'
        required: false
        default: false
        type: boolean

concurrency:
  group: aronaapi-docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag || '' }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest || 'false' }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"
          short_sha="${GITHUB_SHA::7}"

          if [[ -n "${IMAGE_TAG_INPUT}" ]]; then
            version="${IMAGE_TAG_INPUT}"
          else
            version="arona-$(date -u +'%Y%m%d')-${short_sha}"
          fi

          if [[ ! "${version}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid Docker tag '${version}'"
            exit 1
          fi

          echo "${version}" > VERSION

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:sha-${short_sha}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image}:main"
            fi
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "Image: ${image}"
          echo "Version: ${version}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### AronaApi Docker image"
            echo
            echo "- Image: \`${{ steps.image.outputs.image }}\`"
            echo "- Version: \`${{ steps.image.outputs.version }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "Tags:"
            echo '```'
            echo "${{ steps.image.outputs.tags }}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
