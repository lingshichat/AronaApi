name: Build AronaApi Docker image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.trellis/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optional image tag, for example 2026-07-05 or prod-20260705'
        required: false
        type: string
      push_latest:
        description: 'Also update ghcr.io/<owner>/<repo>:latest'
        required: false
        default: false
        type: boolean

concurrency:
  group: aronaapi-docker-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare image metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      version: ${{ steps.image.outputs.version }}
      short_sha: ${{ steps.image.outputs.short_sha }}
      push_latest: ${{ steps.image.outputs.push_latest }}

    steps:
      - name: Prepare metadata
        id: image
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ github.event.inputs.image_tag || '' }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest || 'false' }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo}"
          short_sha="${GITHUB_SHA::7}"

          if [[ -n "${IMAGE_TAG_INPUT}" ]]; then
            version="${IMAGE_TAG_INPUT}"
          else
            version="arona-$(date -u +'%Y%m%d')-${short_sha}"
          fi

          if [[ ! "${version}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid Docker tag '${version}'"
            exit 1
          fi

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "short_sha=${short_sha}"
            echo "push_latest=${PUSH_LATEST}"
          } >> "${GITHUB_OUTPUT}"

          echo "Image: ${image}"
          echo "Version: ${version}"

  build_single_arch:
    name: Build and push ${{ matrix.arch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Write VERSION
        shell: bash
        run: echo "${{ needs.prepare.outputs.version }}" > VERSION

      - name: Prepare arch tags
        id: tags
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          PUSH_LATEST: ${{ needs.prepare.outputs.push_latest }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          {
            echo "value<<EOF"
            echo "${IMAGE}:${VERSION}-${ARCH}"
            echo "${IMAGE}:sha-${SHORT_SHA}-${ARCH}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE}:main-${ARCH}"
            fi
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest-${ARCH}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Write arch summary
        shell: bash
        run: |
          {
            echo "### AronaApi Docker image (${{ matrix.arch }})"
            echo
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "Tags:"
            echo '```'
            echo "${{ steps.tags.outputs.value }}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  create_manifest:
    name: Create multi-arch manifests
    needs:
      - prepare
      - build_single_arch
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          PUSH_LATEST: ${{ needs.prepare.outputs.push_latest }}
        run: |
          set -euo pipefail

          create_manifest() {
            local tag="$1"
            docker buildx imagetools create \
              -t "${IMAGE}:${tag}" \
              "${IMAGE}:${tag}-amd64" \
              "${IMAGE}:${tag}-arm64"
          }

          create_manifest "${VERSION}"
          create_manifest "sha-${SHORT_SHA}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            create_manifest "main"
          fi

          if [[ "${PUSH_LATEST}" == "true" ]]; then
            create_manifest "latest"
          fi

      - name: Write manifest summary
        shell: bash
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          PUSH_LATEST: ${{ needs.prepare.outputs.push_latest }}
        run: |
          {
            echo "### AronaApi multi-arch image"
            echo
            echo "- Image: \`${IMAGE}\`"
            echo "- Version: \`${VERSION}\`"
            echo
            echo "Tags:"
            echo '```'
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE}:main"
            fi
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest"
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
